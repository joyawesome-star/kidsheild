<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>QR Batch</title>
</head>
<body style="margin:0;min-height:100vh;background:#1a1a2e;color:white;font-family:Segoe UI,Arial,sans-serif;">
  <div style="max-width:1100px;margin:0 auto;padding:24px;">
    <h2 style="margin:0 0 16px 0;">Generated QR Codes</h2>

    <div id="qrItems" style="display:flex;flex-wrap:wrap;align-items:flex-start;justify-content:flex-start;">
      <!-- QR cards are rendered client-side -->
    </div>

    <div style="margin-top:20px;display:flex;gap:12px;flex-wrap:wrap;">
      <a id="downloadZipLink" href="#" style="background:linear-gradient(135deg, #667eea 0%, #764ba2 100%);color:white;padding:12px 16px;border-radius:8px;text-decoration:none;font-weight:700;display:inline-block;">
        Download ZIP
      </a>
      <a href="/admin_dashboard.html" style="color:#a5b4fc;text-decoration:none;font-weight:700;align-self:center;">
        Go to dashboard
      </a>
    </div>
  </div>

  <script>
    function getQueryInt(name, fallback) {
      const params = new URLSearchParams(window.location.search);
      const raw = params.get(name);
      if (raw === null || raw === undefined) return fallback;
      const n = parseInt(raw, 10);
      return Number.isFinite(n) ? n : fallback;
    }

    function clamp(n, min, max) {
      return Math.max(min, Math.min(max, n));
    }

    const count = clamp(getQueryInt('count', 1), 1, 100);

    const zipLink = document.getElementById('downloadZipLink');
    zipLink.href = `/download_qr_batch?count=${encodeURIComponent(count)}`;

    async function loadQrItems() {
      const qrItemsEl = document.getElementById('qrItems');
      qrItemsEl.innerHTML = '';

      try {
        const res = await fetch(`/api/qrcode_batch_items?count=${encodeURIComponent(count)}`);
        const data = await res.json();

        const items = Array.isArray(data?.items) ? data.items : [];
        if (items.length === 0) {
          qrItemsEl.innerHTML = `<div style="color:#a5b4fc;padding:12px;">No QR codes found.</div>`;
          return;
        }

        qrItemsEl.innerHTML = items.map((it) => {
          const imageUrl = it?.image_url || '';
          const uid = it?.qr_unique_id ?? '';
          return `
            <div style="display:flex;flex-direction:column;gap:6px;margin:12px;padding:12px;border:1px solid rgba(255,255,255,0.2);border-radius:10px;background:rgba(255,255,255,0.06)">
              <img src="${imageUrl}" style="width:220px;height:220px;object-fit:contain" />
              <div style="color:white;font-family:Segoe UI,Arial,sans-serif;font-size:14px">QR Unique ID: ${uid}</div>
            </div>
          `;
        }).join('');
      } catch (e) {
        qrItemsEl.innerHTML = `<div style="color:#ff9999;padding:12px;">Failed to load QR codes.</div>`;
        console.error(e);
      }
    }

    loadQrItems();
  </script>
</body>
</html>
