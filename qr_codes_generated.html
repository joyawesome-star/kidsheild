<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>QR Batch</title>
  <style>
    * {
      box-sizing: border-box;
    }
    body {
      margin: 0;
      min-height: 100vh;
      background: #1a1a2e;
      color: white;
      font-family: "Segoe UI", Arial, sans-serif;
      padding: 1.5rem;
    }
    .container {
      max-width: 1100px;
      margin: 0 auto;
    }
    h2 {
      margin: 0 0 1rem 0;
      font-size: 1.375rem;
    }
    #qrItems {
      display: flex;
      flex-wrap: wrap;
      align-items: flex-start;
      justify-content: center;
      gap: 1rem;
    }
    .qr-card {
      display: flex;
      flex-direction: column;
      gap: 0.375rem;
      padding: 0.75rem;
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 0.625rem;
      background: rgba(255,255,255,0.06);
      width: 100%;
      max-width: 260px;
    }
    .qr-card img {
      width: 100%;
      height: auto;
      aspect-ratio: 1 / 1;
      object-fit: contain;
    }
    .qr-card .uid {
      color: white;
      font-size: 0.875rem;
      word-break: break-all;
    }
    .actions {
      margin-top: 1.25rem;
      display: flex;
      gap: 0.75rem;
      flex-wrap: wrap;
    }
    .zip-link {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      padding: 0.75rem 1rem;
      border-radius: 0.5rem;
      text-decoration: none;
      font-weight: 700;
      display: inline-block;
    }
    .dash-link {
      color: #a5b4fc;
      text-decoration: none;
      font-weight: 700;
      align-self: center;
    }
    @media (max-width: 640px) {
      body { padding: 1rem; }
      .qr-card { max-width: 100%; }
      .actions { flex-direction: column; align-items: center; }
    }
  </style>
</head>
<body>
  <div class="container">
    <h2>Generated QR Codes</h2>

    <div id="qrItems">
      <!-- QR cards are rendered client-side -->
    </div>

    <div class="actions">
      <a id="downloadZipLink" href="#" class="zip-link">Download ZIP</a>
      <a href="/admin_dashboard.html" class="dash-link">Go to dashboard</a>
    </div>
  </div>

  <script>
    function getQueryInt(name, fallback) {
      const params = new URLSearchParams(window.location.search);
      const raw = params.get(name);
      if (raw === null || raw === undefined) return fallback;
      const n = parseInt(raw, 10);
      return Number.isFinite(n) ? n : fallback;
    }

    function clamp(n, min, max) {
      return Math.max(min, Math.min(max, n));
    }

    const count = clamp(getQueryInt('count', 1), 1, 100);

    const zipLink = document.getElementById('downloadZipLink');
    zipLink.href = `/download_qr_batch?count=${encodeURIComponent(count)}`;

    async function loadQrItems() {
      const qrItemsEl = document.getElementById('qrItems');
      qrItemsEl.innerHTML = '';

      try {
        const res = await fetch(`/api/qrcode_batch_items?count=${encodeURIComponent(count)}`);
        const data = await res.json();

        const items = Array.isArray(data?.items) ? data.items : [];
        if (items.length === 0) {
          qrItemsEl.innerHTML = `<div style="color:#a5b4fc;padding:12px;">No QR codes found.</div>`;
          return;
        }

        qrItemsEl.innerHTML = items.map((it) => {
          const imageUrl = it?.image_url || '';
          const uid = it?.qr_unique_id ?? '';
          return `
            <div class="qr-card">
              <img src="${imageUrl}" alt="QR code" />
              <div class="uid">QR Unique ID: ${uid}</div>
            </div>
          `;
        }).join('');
      } catch (e) {
        qrItemsEl.innerHTML = `<div style="color:#ff9999;padding:12px;">Failed to load QR codes.</div>`;
        console.error(e);
      }
    }

    loadQrItems();
  </script>
</body>
</html>
